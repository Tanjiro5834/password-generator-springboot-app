<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Authentication - Password Generator & Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root {
      --bg-main: #f5f5f7;
      --bg-card: rgba(255, 255, 255, 0.78);
      --text-main: #1d1d1f;
      --text-muted: #6e6e73;
      --border-color: rgba(0, 0, 0, 0.08);
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
      --input-bg: rgba(255, 255, 255, 0.92);
      --toggle-bg: #ffffff;
      --accent: #0071e3;
      --accent-hover: #005fcc;
    }
    html[data-theme="dark"] {
      --bg-main: #0b0b0f;
      --bg-card: rgba(28, 28, 30, 0.78);
      --text-main: #f5f5f7;
      --text-muted: #a1a1a6;
      --border-color: rgba(255, 255, 255, 0.08);
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      --input-bg: rgba(36, 36, 38, 0.92);
      --toggle-bg: #1c1c1e;
      --accent: #0a84ff;
      --accent-hover: #409cff;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(0, 113, 227, 0.10), transparent 30%),
        radial-gradient(circle at bottom right, rgba(120, 119, 198, 0.12), transparent 30%),
        var(--bg-main);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      transition: background 0.3s ease, color 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .auth-shell {
      width: 100%;
      max-width: 760px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      overflow: hidden;
    }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 24px;
      border-bottom: 1px solid var(--border-color);
      flex-wrap: wrap;
    }
    .brand-title { font-size: 2rem; font-weight: 700; letter-spacing: -0.03em; margin: 0; }
    .brand-subtitle { margin: 6px 0 0; color: var(--text-muted); font-size: 0.98rem; }
    .theme-toggle, .btn-soft {
      border: 1px solid var(--border-color);
      background: var(--toggle-bg);
      color: var(--text-main);
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 600;
      transition: all 0.25s ease;
    }
    .theme-toggle:hover, .btn-soft:hover, .btn-apple:hover { transform: translateY(-1px); }
    .content { padding: 24px; }
    .hero-actions { display:flex; gap:12px; flex-wrap:wrap; margin-bottom: 20px; }
    .btn-apple {
      background: var(--accent);
      border: none;
      color: white;
      border-radius: 999px;
      padding: 11px 18px;
      font-weight: 600;
      transition: all 0.25s ease;
      text-decoration: none;
    }
    .btn-apple:hover { background: var(--accent-hover); color: white; }
    .auth-tabs { display:flex; gap:10px; margin-bottom: 16px; }
    .auth-tab { flex:1; }
    .control-block {
      background: rgba(127,127,127,0.05);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 18px;
    }
    .section-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.02em; }
    .muted { color: var(--text-muted); }
    .hidden { display:none !important; }
    @media (max-width: 576px) { .top-bar, .content { padding: 18px; } .brand-title { font-size: 1.6rem; } }
  </style>
</head>
<body>
  <div class="auth-shell">
    <div class="top-bar">
      <div>
        <h1 class="brand-title">Vault Authentication</h1>
        <p class="brand-subtitle">Login or create an account here, then jump back to your password manager.</p>
      </div>
      <button id="themeToggle" class="theme-toggle" type="button">
        <span id="themeIcon">🌙</span>
        <span id="themeText">Dark Mode</span>
      </button>
    </div>
    <div class="content">
      <div class="hero-actions">
        <a href="index_modified.html" class="btn btn-soft">← Back to Generator</a>
      </div>

      <div class="auth-tabs">
        <button class="btn btn-soft auth-tab" id="showLoginBtn" type="button">Login</button>
        <button class="btn btn-soft auth-tab" id="showRegisterBtn" type="button">Register</button>
      </div>

      <form id="loginForm" class="control-block">
        <div class="section-title">Login</div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required>
        </div>
        <button class="btn btn-apple w-100" type="submit">Login</button>
      </form>

      <form id="registerForm" class="control-block hidden">
        <div class="section-title">Register</div>
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" id="registerName" class="form-control" placeholder="Enter your name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" id="registerEmail" class="form-control" placeholder="Enter your email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="registerPassword" class="form-control" placeholder="Create a password" required>
        </div>
        <button class="btn btn-apple w-100" type="submit">Register</button>
      </form>

      <p class="muted small mt-3 mb-0">After a successful login or registration, this page redirects back to the main generator and unlocks the vault UI.</p>
    </div>
  </div>

  <script>
    const themeToggle = document.getElementById("themeToggle");
    const themeText = document.getElementById("themeText");
    const themeIcon = document.getElementById("themeIcon");
    const showLoginBtn = document.getElementById("showLoginBtn");
    const showRegisterBtn = document.getElementById("showRegisterBtn");
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem("password-generator-theme", theme);
      const isDark = theme === "dark";
      themeText.textContent = isDark ? "Light Mode" : "Dark Mode";
      themeIcon.textContent = isDark ? "☀️" : "🌙";
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute("data-theme");
      applyTheme(currentTheme === "light" ? "dark" : "light");
    }

    function showLogin() {
      loginForm.classList.remove("hidden");
      registerForm.classList.add("hidden");
    }

    function showRegister() {
      registerForm.classList.remove("hidden");
      loginForm.classList.add("hidden");
    }

    async function handleRegister(event) {
      event.preventDefault();
      const payload = {
        name: document.getElementById("registerName").value.trim(),
        email: document.getElementById("registerEmail").value.trim(),
        password: document.getElementById("registerPassword").value
      };

      try {
        const response = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error("Registration failed.");
        const user = await response.json();
        localStorage.setItem("password-manager-user", JSON.stringify(user));
        alert("Registration successful. Redirecting to the vault manager.");
        window.location.href = "index_modified.html";
      } catch (error) {
        console.error(error);
        alert("Registration failed.");
      }
    }

    async function handleLogin(event) {
      event.preventDefault();
      const payload = {
        email: document.getElementById("loginEmail").value.trim(),
        password: document.getElementById("loginPassword").value
      };

      try {
        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error("Login failed.");
        const user = await response.json();
        localStorage.setItem("password-manager-user", JSON.stringify(user));
        window.location.href = "index_modified.html";
      } catch (error) {
        console.error(error);
        alert("Login failed.");
      }
    }

    showLoginBtn.addEventListener("click", showLogin);
    showRegisterBtn.addEventListener("click", showRegister);
    loginForm.addEventListener("submit", handleLogin);
    registerForm.addEventListener("submit", handleRegister);
    themeToggle.addEventListener("click", toggleTheme);

    applyTheme(localStorage.getItem("password-generator-theme") || "light");
    showLogin();
  </script>
</body>
</html>
